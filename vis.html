<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vis Network | Data | Scaling Labels</title>

    <style type="text/css">
        html,
        body {
            font: 10pt arial;
        }

        #mynetwork {
            width: 600px;
            height: 600px;
            border: 1px solid lightgray;
        }
    </style>

    <script type="text/javascript"
            src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <script type="text/javascript"
            src="summary.js"></script>

    <script type="text/javascript">
        var nodes = null;
        var edges = null;
        var network = null;

        function draw() {

            // Instantiate our network object.
            var container = document.getElementById("mynetwork");
            var options = {
                nodes: {
                    shape: "dot",
                    scaling: {
                        label: {
                            min: 8,
                            max: 20,
                        },
                    },
                },
            };
            network = new vis.Network(container, data, options);
        }
    </script>
</head>
<body onload="draw()">
<p>
    Scale nodes and edges depending on their value. Hover over edges to get a
    popup with more information.
</p>
<div id="mynetwork"></div>
</body>
</html>
